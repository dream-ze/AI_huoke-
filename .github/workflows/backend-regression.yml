name: backend-regression

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-regression.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-regression.yml"
  workflow_dispatch:

jobs:
  auth-regression-fast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: CI_SECRET_KEY_12345678901234567890AB
      DATABASE_URL: postgresql://postgres:password@localhost/zhihuokeke
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run mandatory auth regression tests
        run: poetry run pytest -q test_main.py -k "sequence_drift or unique_constraint"

  auth-regression-postgres:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zhihuokeke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: CI_SECRET_KEY_12345678901234567890AB
      DATABASE_URL: postgresql://postgres:password@localhost:5432/zhihuokeke
      RUN_POSTGRES_REGRESSION: "1"
      TEST_POSTGRES_DATABASE_URL: postgresql://postgres:password@localhost:5432/zhihuokeke
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run postgres regression tests
        run: poetry run pytest -q -m "postgres_regression" test_user_service_postgres_regression.py
