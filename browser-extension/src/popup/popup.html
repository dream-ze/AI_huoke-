<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智获客采集助手</title>
    <style>
      :root {
        --bg: #f3f6f9;
        --card: #ffffff;
        --text: #1b2a38;
        --muted: #5a6b7a;
        --accent: #0d6fdb;
        --accent-2: #0a5ab2;
        --ok: #118a38;
        --err: #b42318;
      }
      body {
        margin: 0;
        width: 360px;
        min-height: 420px;
        font: 13px/1.5 "Segoe UI", "PingFang SC", sans-serif;
        background: linear-gradient(155deg, #edf4fb, #f7fafc 45%, #eef6ef);
        color: var(--text);
      }
      .wrap {
        padding: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid #d7e1ea;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 8px 18px rgba(27, 42, 56, 0.06);
      }
      .title {
        margin: 0 0 8px;
        font-size: 15px;
      }
      .hint {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
      }
      label {
        display: block;
        margin: 8px 0 4px;
        font-size: 12px;
        color: var(--muted);
      }
      input {
        width: 100%;
        border: 1px solid #c9d8e6;
        border-radius: 8px;
        padding: 8px;
        box-sizing: border-box;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .actions {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button {
        border: 1px solid #b8cce1;
        border-radius: 8px;
        padding: 8px;
        cursor: pointer;
        background: #fff;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      button.primary:hover {
        background: var(--accent-2);
      }
      .status {
        margin-top: 10px;
        padding: 8px;
        border-radius: 8px;
        background: #fff;
        border: 1px dashed #c7d7e8;
        min-height: 42px;
        white-space: pre-wrap;
      }
      .status.ok {
        color: var(--ok);
        border-color: #95d2a8;
        background: #f0fbf4;
      }
      .status.err {
        color: var(--err);
        border-color: #f2b8b5;
        background: #fff5f5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">智获客采集助手</h1>
        <p class="hint">先配置 API 与 Token，再点击“采集当前页”</p>

        <label for="apiBaseUrl">API Base URL</label>
        <input id="apiBaseUrl" placeholder="http://127.0.0.1:8000" />

        <label for="authToken">Bearer Token</label>
        <input id="authToken" type="password" placeholder="粘贴登录 token" />

        <div class="row">
          <div>
            <label for="requestTimeoutMs">超时(ms)</label>
            <input id="requestTimeoutMs" type="number" min="1000" step="500" />
          </div>
          <div>
            <label for="maxRetries">重试次数</label>
            <input id="maxRetries" type="number" min="0" max="5" />
          </div>
        </div>

        <div class="actions">
          <button id="saveBtn">保存配置</button>
          <button id="testBtn">测试连接</button>
          <button id="collectBtn" class="primary">采集当前页</button>
          <button id="clearBtn">清空 Token</button>
        </div>

        <div id="status" class="status">等待操作...</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
