<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智获客 Mobile H5</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>智获客移动采集入口</h1>
        <p>用于移动端快速入收件箱，支持分享采集、截图 OCR、快捷记录和企微转发承接。</p>
      </header>

      <section class="grid">
        <a class="card" href="./src/pages/share-collect/index.html">
          <h2>分享采集</h2>
          <p>手动填写平台链接与正文，提交到统一采集入口。</p>
        </a>
        <a class="card" href="./src/pages/screenshot-ocr/index.html">
          <h2>截图 OCR</h2>
          <p>上传截图识别文本，可直接进入收件箱。</p>
        </a>
        <a class="card" href="./src/pages/quick-note/index.html">
          <h2>快捷记录</h2>
          <p>临时灵感和客户反馈，一键保存为收件箱待分拣。</p>
        </a>
        <a class="card" href="./src/pages/wecom-redirect/index.html">
          <h2>企微转发承接</h2>
          <p>接收转发参数并二次确认后入库。</p>
        </a>
      </section>

      <footer class="footer">
        <span>建议在同一局域网内访问后端服务，避免跨网段超时。</span>
      </footer>
    </main>
  </body>
</html>
