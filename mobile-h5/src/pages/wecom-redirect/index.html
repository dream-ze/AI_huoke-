<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企微转发承接 - 智获客 Mobile H5</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <main class="page" id="app">
      <a class="header-link" href="../../../index.html">返回首页</a>
      <section class="panel form-grid">
        <h1>企微转发承接</h1>
        <p>支持从 URL 参数预填：title、content、url、author、platform。优先企业微信 OAuth 登录，其次短期票据。</p>
        <div class="row">
          <label>API Base URL<input id="baseUrl" placeholder="http://127.0.0.1:8000" /></label>
          <label>移动 Token（应急）<input id="token" placeholder="优先使用 OAuth/ticket 自动换取" /></label>
        </div>
        <div class="row">
          <label>超时（毫秒）<input id="timeoutMs" type="number" min="3000" step="1000" /></label>
          <label>重试次数<input id="maxRetries" type="number" min="0" max="3" step="1" /></label>
        </div>
        <button id="saveConfig" type="button" class="secondary">保存配置</button>
        <!-- 企业微信 OAuth 登录按钮：仅在后端已配置 Corp OAuth 时显示 -->
        <button id="wecomLoginBtn" type="button" class="secondary" style="display:none">企业微信授权登录</button>
        <div id="authStatus" class="status auth-status">正在检测授权状态...</div>
      </section>

      <section class="panel form-grid">
        <div class="row">
          <label>平台
            <select id="platform">
              <option value="wechat">微信</option>
              <option value="xiaohongshu">小红书</option>
              <option value="douyin">抖音</option>
              <option value="other">其他</option>
            </select>
          </label>
          <label>作者<input id="author" /></label>
        </div>
        <label>来源链接<input id="sourceUrl" placeholder="https://..." /></label>
        <label>标题<input id="title" /></label>
        <label>正文<textarea id="content"></textarea></label>
        <button id="submitBtn" type="button">确认转发并入收件箱</button>
      </section>

      <section class="panel">
        <div id="status" class="status">等待提交</div>
      </section>
    </main>

    <script type="module">
      import {
        bindGlobalConfig,
        bootstrapPageAuth,
        buildClientRequestId,
        buildWecomOAuthUrl,
        callApi,
        getConfigFromPage,
        loadRuntimeConfig,
        setButtonBusy,
        setStatus,
      } from "../../utils/api-client.js";

      const app = document.querySelector("#app");
      bindGlobalConfig(app);
      await bootstrapPageAuth(app).catch(() => null);

      // 查询后端是否已启用企业微信 OAuth，决定是否展示登录按钮
      const { baseUrl } = loadRuntimeConfig();
      try {
        const cfgResp = await fetch(`${baseUrl.replace(/\/$/, "")}/api/auth/wecom/config`);
        if (cfgResp.ok) {
          const cfg = await cfgResp.json();
          if (cfg.oauth_enabled && cfg.corp_id) {
            const wecomLoginBtn = app.querySelector("#wecomLoginBtn");
            wecomLoginBtn.style.display = "";
            wecomLoginBtn.addEventListener("click", () => {
              const redirectUri = encodeURIComponent(window.location.href.split("?")[0]);
              window.location.href = buildWecomOAuthUrl(cfg.corp_id, window.location.href.split("?")[0]);
            });
          }
        }
      } catch (_) {
        // 非关键路径，静默忽略
      }

      const qs = new URLSearchParams(location.search);
      app.querySelector("#platform").value = qs.get("platform") || "wechat";
      app.querySelector("#author").value = qs.get("author") || "";
      app.querySelector("#sourceUrl").value = qs.get("url") || "";
      app.querySelector("#title").value = qs.get("title") || "";
      app.querySelector("#content").value = qs.get("content") || "";

      const submitBtn = app.querySelector("#submitBtn");

      submitBtn.addEventListener("click", async () => {
        const { baseUrl, token, requestTimeoutMs, maxRetries } = getConfigFromPage(app);
        const payload = {
          platform: app.querySelector("#platform").value,
          source_url: app.querySelector("#sourceUrl").value || null,
          content_type: "post",
          title: app.querySelector("#title").value,
          content: app.querySelector("#content").value,
          author: app.querySelector("#author").value || null,
          manual_note: "来自 mobile-h5 wecom-redirect",
          source_type: "wechat_forward",
          tags: ["wecom-forward"],
          metrics: {},
          raw_payload: {
            entry: "mobile-h5/wecom-redirect",
            query: Object.fromEntries(qs.entries())
          },
          client_request_id: buildClientRequestId("wecom"),
        };

        if (!token) {
          setStatus(app, "当前未授权，请通过企业微信应用链接进入，或联系管理员发放短期票据。", true);
          return;
        }

        if (!payload.title || !payload.content) {
          setStatus(app, "标题和正文不能为空", true);
          return;
        }

        try {
          setStatus(app, "提交中...");
          setButtonBusy(submitBtn, true, "提交中...", "确认转发并入收件箱");
          const data = await callApi({
            baseUrl,
            token,
            path: "/api/v1/collect/intake",
            method: "POST",
            body: payload,
            timeoutMs: requestTimeoutMs,
            maxRetries,
            requestKey: "wecom-redirect-submit",
          });
          setStatus(app, `提交成功\n${JSON.stringify(data, null, 2)}`);
        } catch (err) {
          setStatus(app, `提交失败\n${err.message}`, true);
        } finally {
          setButtonBusy(submitBtn, false, "提交中...", "确认转发并入收件箱");
        }
      });
    </script>
  </body>
</html>

</html>
