groups:
  - name: zhk_alerts
    rules:
      - alert: ServiceDown
        expr: up{job="zhk-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "智获客后端服务宕机"
          description: "后端服务已经宕机超过1分钟"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "错误率超过5%"
          description: "过去5分钟内HTTP 5xx错误率超过5%"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95响应时间超过2秒"
          description: "过去5分钟内P95响应时间超过2秒"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "内存使用超过512MB"
