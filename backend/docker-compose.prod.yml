# ============================================================
# 智获客 - 生产部署 (服务器: 116.62.86.160)
# 使用方法: docker compose --env-file .env.server -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  # ── PostgreSQL 数据库 ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: zhihuokeke-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD not set}
      POSTGRES_DB: zhihuokeke
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── FastAPI 后端 ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhihuokeke-backend
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD}@postgres:5432/zhihuokeke
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
      - /opt/zhihuokeke/desktop/dist:/desktop/dist:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/system/ops/readiness', timeout=3).getcode() == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Ollama 本地 AI 模型 ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: zhihuokeke-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Redis 限流/缓存 ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zhihuokeke-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Celery Worker ───────────────────────────────────────
  celery-worker:
    build: .
    container_name: zhihuokeke-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.server
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD}@postgres:5432/zhihuokeke
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      DEBUG: "False"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Celery Beat ─────────────────────────────────────────
  celery-beat:
    build: .
    container_name: zhihuokeke-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env.server
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD}@postgres:5432/zhihuokeke
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
      DEBUG: "False"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx 前端代理 ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zhihuokeke-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/zhihuokeke/desktop/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uploads_data:
  ollama_data:
  redis_data:

networks:
  default:
    name: zhihuokeke-network
